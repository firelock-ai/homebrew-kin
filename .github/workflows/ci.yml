name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify release correlation policy
        run: python3 scripts/test-update-formula-workflow.py
      - name: Verify renderer and current formula syntax
        run: |
          bash -n scripts/render-formula.sh
          ruby -c Formula/kin.rb
